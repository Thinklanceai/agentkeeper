<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#131829"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#38cfb8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e6ebf2" font-size="22" font-weight="600">
    AgentKeeper — Cognitive Continuity Infrastructure
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#8a93a6" font-size="13">
    Reconstructs persistent cognitive state across model switches, crashes, restarts, and constrained contexts
  </text>

  <!-- Layer 1: Public API -->
  <g>
    <rect x="60" y="100" width="780" height="60" rx="8" fill="#1a2138" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="450" y="125" text-anchor="middle" fill="#4f8cff" font-size="11" letter-spacing="1.5" font-weight="600">PUBLIC API</text>
    <text x="450" y="148" text-anchor="middle" fill="#c8d0e0" font-size="13" font-family="JetBrains Mono, Consolas, monospace">
      agent.remember() · agent.recall() · agent.ask() · agent.compress() · agent.set_identity() · agent.save()
    </text>
  </g>

  <!-- Arrow down -->
  <path d="M450 165 L450 185" stroke="#4f8cff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: CRE -->
  <g>
    <rect x="60" y="190" width="780" height="80" rx="8" fill="#1a2138" stroke="url(#accent)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="450" y="215" text-anchor="middle" fill="#38cfb8" font-size="11" letter-spacing="1.5" font-weight="600">COGNITIVE RECONSTRUCTION ENGINE (CRE)</text>
    <text x="450" y="240" text-anchor="middle" fill="#c8d0e0" font-size="13">
      Identity injection · Importance ranking · Semantic boost
    </text>
    <text x="450" y="258" text-anchor="middle" fill="#8a93a6" font-size="12">
      Token budget · Profile-driven rendering · Critical-fact eviction
    </text>
  </g>

  <!-- Arrows to 4 columns -->
  <path d="M180 275 L180 305" stroke="#4f8cff" stroke-width="1.5"/>
  <path d="M375 275 L375 305" stroke="#4f8cff" stroke-width="1.5"/>
  <path d="M555 275 L555 305" stroke="#4f8cff" stroke-width="1.5"/>
  <path d="M735 275 L735 305" stroke="#4f8cff" stroke-width="1.5"/>

  <!-- Layer 3: 4 modules side by side -->
  <!-- Memory Hierarchy -->
  <g>
    <rect x="80" y="310" width="190" height="170" rx="8" fill="#1a2138" stroke="#2a3656" stroke-width="1"/>
    <text x="175" y="332" text-anchor="middle" fill="#4f8cff" font-size="11" letter-spacing="1" font-weight="600">MEMORY HIERARCHY</text>
    <text x="100" y="360" fill="#c8d0e0" font-size="12">• working</text>
    <text x="100" y="382" fill="#c8d0e0" font-size="12">• episodic</text>
    <text x="100" y="404" fill="#c8d0e0" font-size="12">• semantic</text>
    <text x="100" y="426" fill="#c8d0e0" font-size="12">• archival</text>
    <text x="175" y="458" text-anchor="middle" fill="#8a93a6" font-size="10">Importance + tier-aware retention</text>
  </g>

  <!-- Semantic Recall -->
  <g>
    <rect x="280" y="310" width="190" height="170" rx="8" fill="#1a2138" stroke="#2a3656" stroke-width="1"/>
    <text x="375" y="332" text-anchor="middle" fill="#4f8cff" font-size="11" letter-spacing="1" font-weight="600">SEMANTIC RECALL</text>
    <text x="300" y="360" fill="#c8d0e0" font-size="12">• Embeddings</text>
    <text x="300" y="382" fill="#c8d0e0" font-size="12">• Vector index</text>
    <text x="300" y="404" fill="#c8d0e0" font-size="12">• Cosine top-k</text>
    <text x="300" y="426" fill="#c8d0e0" font-size="12">• Pluggable</text>
    <text x="375" y="458" text-anchor="middle" fill="#8a93a6" font-size="10">sentence-transformers · OpenAI · custom</text>
  </g>

  <!-- Cognitive Compression -->
  <g>
    <rect x="480" y="310" width="190" height="170" rx="8" fill="#1a2138" stroke="#2a3656" stroke-width="1"/>
    <text x="575" y="332" text-anchor="middle" fill="#4f8cff" font-size="11" letter-spacing="1" font-weight="600">COMPRESSION</text>
    <text x="500" y="360" fill="#c8d0e0" font-size="12">• Decay</text>
    <text x="500" y="382" fill="#c8d0e0" font-size="12">• Consolidation</text>
    <text x="500" y="404" fill="#c8d0e0" font-size="12">• Contradictions</text>
    <text x="500" y="426" fill="#c8d0e0" font-size="12">• Pipeline</text>
    <text x="575" y="458" text-anchor="middle" fill="#8a93a6" font-size="10">Identity exempt · LLM synth optional</text>
  </g>

  <!-- Cross-Model Translation -->
  <g>
    <rect x="680" y="310" width="190" height="170" rx="8" fill="#1a2138" stroke="#2a3656" stroke-width="1"/>
    <text x="775" y="332" text-anchor="middle" fill="#4f8cff" font-size="11" letter-spacing="1" font-weight="600">TRANSLATION</text>
    <text x="700" y="360" fill="#c8d0e0" font-size="12">• XML (Claude)</text>
    <text x="700" y="382" fill="#c8d0e0" font-size="12">• Sections (GPT)</text>
    <text x="700" y="404" fill="#c8d0e0" font-size="12">• Narrative (Gemini)</text>
    <text x="700" y="426" fill="#c8d0e0" font-size="12">• Minimal (Ollama)</text>
    <text x="775" y="458" text-anchor="middle" fill="#8a93a6" font-size="10">Per-provider cognitive profile</text>
  </g>

  <!-- Arrows down to storage -->
  <path d="M450 490 L450 520" stroke="#4f8cff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Storage -->
  <g>
    <rect x="280" y="525" width="340" height="60" rx="8" fill="#1a2138" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="450" y="550" text-anchor="middle" fill="#38cfb8" font-size="11" letter-spacing="1.5" font-weight="600">STORAGE — SQLite-first · Vendor-agnostic</text>
    <text x="450" y="572" text-anchor="middle" fill="#8a93a6" font-size="11">Zero infrastructure · MIT license · No central authority</text>
  </g>

  <!-- Marker for arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f8cff"/>
    </marker>
  </defs>
</svg>
